<body>
  <div class="flex min-h-screen items-center justify-center p-6">
    <div class="w-full max-w-md bg-white rounded-xl shadow-md overflow-hidden p-8">
      
      <div id="login-form">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Login</h1>
        
        <form action="/login" method="POST" class="flex flex-col gap-4">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" name="email" id="email" required 
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500">
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
            <input type="password" name="password" id="password" required 
                   class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-yellow-500 focus:border-yellow-500">
          </div>

          <button type="submit" 
                  class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded transition duration-200">
            Sign In
          </button>
        </form>
      </div>

      <hr class="my-8 border-gray-200">

      <div id="create-user-form" class="text-center">
        <h2 class="text-gray-600 mb-4">Don't have an account? Sign up!</h2>
        <button type="button" 
                class="w-full bg-yellow-600 hover:bg-yellow-700 text-white px-10 py-3 rounded-lg text-lg font-bold shadow-lg transition">
          Create Account
        </button>
      </div>

    </div>
  </div>
</body>
